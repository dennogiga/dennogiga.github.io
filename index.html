<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電脳戯画</title>
    <meta name="description" content="電脳戯画 - オリジナル漫画・ゲーム・イラスト制作">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #fafafa;
            --text: #1a1a1a;
            --text-muted: #666;
            --accent: #1a1a1a;
            --border: #e0e0e0;
        }

        html {
            font-size: 16px;
        }

        body {
            font-family: 'Zen Kaku Gothic New', sans-serif;
            font-weight: 300;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            letter-spacing: 0.02em;
            line-height: 1.8;
            position: relative;
        }

        /* Background Logo */
        body::before {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: min(70vh, 70vw);
            height: min(70vh, 70vw);
            background-image: url('LOGO.jpg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.08;
            pointer-events: none;
            z-index: 0;
        }

        /* Header */
        header {
            padding: 2rem 3rem;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
        }

        .logo {
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .logo:hover {
            opacity: 0.5;
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 8rem 3rem 4rem;
            opacity: 0;
            animation: fadeIn 1.2s ease forwards;
            animation-delay: 0.3s;
            position: relative;
            z-index: 1;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Home Section */
        .home {
            text-align: center;
            max-width: 600px;
        }

        .title {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 300;
            letter-spacing: 0.3em;
            margin-bottom: 2rem;
            opacity: 0;
            animation: slideUp 0.8s ease forwards;
            animation-delay: 0.5s;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tagline {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 4rem;
            opacity: 0;
            animation: slideUp 0.8s ease forwards;
            animation-delay: 0.7s;
        }

        /* Navigation Links */
        nav {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            opacity: 0;
            animation: slideUp 0.8s ease forwards;
            animation-delay: 0.9s;
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            padding: 0.5rem 0;
            position: relative;
            transition: all 0.3s ease;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 1px;
            background: var(--text);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        nav a:hover {
            letter-spacing: 0.15em;
        }

        nav a:hover::after {
            width: 100%;
        }

        /* Works Section (Hidden by default) */
        .works {
            display: none;
            max-width: 800px;
            width: 100%;
        }

        .works.active {
            display: block;
        }

        .section-title {
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            color: var(--text-muted);
            margin-bottom: 3rem;
            text-align: center;
        }

        .works-list {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .work-item {
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .work-item:hover {
            padding-left: 1rem;
        }

        .work-item h3 {
            font-weight: 400;
            font-size: 1rem;
            margin-bottom: 0.5rem;
            letter-spacing: 0.05em;
        }

        .work-item p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .back-link {
            display: inline-block;
            margin-top: 3rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-decoration: none;
            letter-spacing: 0.1em;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--text);
        }

        /* Footer */
        footer {
            padding: 2rem 3rem;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            position: relative;
            z-index: 1;
        }

        /* Mobile */
        @media (max-width: 600px) {
            header {
                padding: 1.5rem 2rem;
            }

            main {
                padding: 6rem 2rem 3rem;
            }

            footer {
                padding: 1.5rem 2rem;
            }

            nav {
                gap: 1rem;
            }

            body::before {
                width: 85vw;
                height: 85vw;
                opacity: 0.05;
            }
        }

        /* Cursor effect */
        .cursor-dot {
            display: none;
        }

        @media (hover: hover) {
            .cursor-dot {
                display: block;
                position: fixed;
                width: 6px;
                height: 6px;
                background: var(--text);
                border-radius: 50%;
                pointer-events: none;
                z-index: 9999;
                opacity: 0;
                transition: opacity 0.3s ease;
            }

            body:hover .cursor-dot {
                opacity: 0.3;
            }
        }
    </style>
</head>
<body>
    <div class="cursor-dot" id="cursor"></div>

    <header>
        <div class="logo" onclick="showHome()">電脳戯画</div>
    </header>

    <main>
        <!-- Home Section -->
        <section class="home" id="home">
            <h1 class="title">電脳戯画</h1>
            <p class="tagline">オリジナル漫画・ゲーム・イラスト</p>
            <nav>
                <a href="https://www.pixiv.net/users/45205654" target="_blank" rel="noopener">Pixiv</a>
                <a href="https://dennougiga.booth.pm/" target="_blank" rel="noopener">Booth</a>
                <a href="https://www.dlsite.com/aix/circle/profile/=/maker_id/RG01014994.html" target="_blank" rel="noopener">DLsite</a>
                <a href="https://www.dmm.co.jp/dc/doujin/-/list/=/article=maker/exclude_ai=0/id=214216/sort=date/" target="_blank" rel="noopener">FANZA</a>
                <a href="https://twitter.com/DennoGiga" target="_blank" rel="noopener">X</a>
                <a href="#" onclick="showWorks(event)">Works</a>
            </nav>
        </section>

        <!-- Works Section -->
        <section class="works" id="works">
            <p class="section-title">SELECTED WORKS</p>
            <div class="works-list">
                <a href="https://dennougiga.booth.pm/" target="_blank" rel="noopener" class="work-item">
                    <h3>最新作はBoothにて</h3>
                    <p>漫画・CG集・ゲーム</p>
                </a>
                <div class="work-item" onclick="window.open('https://www.pixiv.net/users/45205654', '_blank')">
                    <h3>過去作品アーカイブ</h3>
                    <p>Pixivにて無料公開中</p>
                </div>
            </div>
            <a href="#" class="back-link" onclick="showHome(event)">← Back</a>
        </section>
    </main>

    <footer>
        <p>© 電脳戯画</p>
    </footer>

    <script>
        // Custom cursor
        const cursor = document.getElementById('cursor');
        
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 3 + 'px';
            cursor.style.top = e.clientY - 3 + 'px';
        });

        // Navigation
        function showHome(e) {
            if (e) e.preventDefault();
            document.getElementById('home').style.display = 'block';
            document.getElementById('works').classList.remove('active');
        }

        function showWorks(e) {
            if (e) e.preventDefault();
            document.getElementById('home').style.display = 'none';
            document.getElementById('works').classList.add('active');
        }
    </script>
</body>
</html>
