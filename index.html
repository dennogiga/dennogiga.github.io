<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電脳戯画</title>
    <meta name="description" content="電脳戯画 - オリジナル漫画・ゲーム・イラスト制作">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #fafafa;
            --text: #1a1a1a;
            --text-muted: #666;
            --accent: #1a1a1a;
            --border: #e0e0e0;
        }

        html {
            font-size: 16px;
        }

        body {
            font-family: 'Zen Kaku Gothic New', sans-serif;
            font-weight: 300;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            letter-spacing: 0.02em;
            line-height: 1.8;
            position: relative;
        }

        /* Background Canvas */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 1;
        }

        /* Header */
        header {
            padding: 2rem 3rem;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
        }

        .logo {
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .logo:hover {
            opacity: 0.5;
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 8rem 3rem 4rem;
            opacity: 0;
            animation: fadeIn 1.2s ease forwards;
            animation-delay: 0.3s;
            position: relative;
            z-index: 1;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Home Section */
        .home {
            text-align: center;
            max-width: 600px;
        }

        .title {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 300;
            letter-spacing: 0.3em;
            margin-bottom: 2rem;
            opacity: 0;
            animation: slideUp 0.8s ease forwards;
            animation-delay: 0.5s;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tagline {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 4rem;
            opacity: 0;
            animation: slideUp 0.8s ease forwards;
            animation-delay: 0.7s;
        }

        /* Navigation Links */
        nav {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            opacity: 0;
            animation: slideUp 0.8s ease forwards;
            animation-delay: 0.9s;
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            padding: 0.5rem 0;
            position: relative;
            transition: all 0.3s ease;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 1px;
            background: var(--text);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        nav a:hover {
            letter-spacing: 0.15em;
        }

        nav a:hover::after {
            width: 100%;
        }

        /* Works Section (Hidden by default) */
        .works {
            display: none;
            max-width: 800px;
            width: 100%;
        }

        .works.active {
            display: block;
        }

        .section-title {
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            color: var(--text-muted);
            margin-bottom: 3rem;
            text-align: center;
        }

        .works-list {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .work-item {
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .work-item:hover {
            padding-left: 1rem;
        }

        .work-item h3 {
            font-weight: 400;
            font-size: 1rem;
            margin-bottom: 0.5rem;
            letter-spacing: 0.05em;
        }

        .work-item p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .back-link {
            display: inline-block;
            margin-top: 3rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-decoration: none;
            letter-spacing: 0.1em;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--text);
        }

        /* Footer */
        footer {
            padding: 2rem 3rem;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            position: relative;
            z-index: 1;
        }

        /* Mobile */
        @media (max-width: 600px) {
            header {
                padding: 1.5rem 2rem;
            }

            main {
                padding: 6rem 2rem 3rem;
            }

            footer {
                padding: 1.5rem 2rem;
            }

            nav {
                gap: 1rem;
            }
        }

        /* Cursor effect */
        .cursor-dot {
            display: none;
        }

        @media (hover: hover) {
            .cursor-dot {
                display: block;
                position: fixed;
                width: 6px;
                height: 6px;
                background: var(--text);
                border-radius: 50%;
                pointer-events: none;
                z-index: 9999;
                opacity: 0;
                transition: opacity 0.3s ease;
            }

            body:hover .cursor-dot {
                opacity: 0.3;
            }
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="cursor-dot" id="cursor"></div>

    <header>
        <div class="logo" onclick="showHome()">電脳戯画</div>
    </header>

    <main>
        <!-- Home Section -->
        <section class="home" id="home">
            <h1 class="title">電脳戯画</h1>
            <p class="tagline">オリジナル漫画・ゲーム・イラスト</p>
            <nav>
                <a href="https://www.pixiv.net/users/45205654" target="_blank" rel="noopener">Pixiv</a>
                <a href="https://dennougiga.booth.pm/" target="_blank" rel="noopener">Booth</a>
                <a href="https://www.dlsite.com/aix/circle/profile/=/maker_id/RG01014994.html" target="_blank" rel="noopener">DLsite</a>
                <a href="https://www.dmm.co.jp/dc/doujin/-/list/=/article=maker/exclude_ai=0/id=214216/sort=date/" target="_blank" rel="noopener">FANZA</a>
                <a href="https://twitter.com/DennoGiga" target="_blank" rel="noopener">X</a>
                <a href="#" onclick="showWorks(event)">Works</a>
            </nav>
        </section>

        <!-- Works Section -->
        <section class="works" id="works">
            <p class="section-title">SELECTED WORKS</p>
            <div class="works-list">
                <a href="https://dennougiga.booth.pm/" target="_blank" rel="noopener" class="work-item">
                    <h3>最新作はBoothにて</h3>
                    <p>漫画・CG集・ゲーム</p>
                </a>
                <div class="work-item" onclick="window.open('https://www.pixiv.net/users/45205654', '_blank')">
                    <h3>過去作品アーカイブ</h3>
                    <p>Pixivにて無料公開中</p>
                </div>
            </div>
            <a href="#" class="back-link" onclick="showHome(event)">← Back</a>
        </section>
    </main>

    <footer>
        <p>© 電脳戯画</p>
    </footer>

    <script>
        // Custom cursor
        const cursor = document.getElementById('cursor');
        
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 3 + 'px';
            cursor.style.top = e.clientY - 3 + 'px';
        });

        // Navigation
        function showHome(e) {
            if (e) e.preventDefault();
            document.getElementById('home').style.display = 'block';
            document.getElementById('works').classList.remove('active');
        }

        function showWorks(e) {
            if (e) e.preventDefault();
            document.getElementById('home').style.display = 'none';
            document.getElementById('works').classList.add('active');
        }

        // Generative Art Background - 3 Patterns
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let time = 0;
        let pattern = Math.floor(Math.random() * 3); // 0, 1, 2
        
        // Pattern-specific data
        let lines = [];
        let particles = [];
        let scanLines = [];
        let networkNodes = [];
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initPattern();
        }
        
        // Draw "d" logo
        function drawLogo(x, y, size, alpha = 1) {
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = size * 0.02;
            
            const s = size;
            
            // Draw stylized "d" - circle with vertical stem
            // Circle part
            ctx.beginPath();
            ctx.arc(x, y, s * 0.35, Math.PI * 0.5, Math.PI * 2.5);
            ctx.stroke();
            
            // Vertical stem
            ctx.beginPath();
            ctx.moveTo(x + s * 0.35, y - s * 0.5);
            ctx.lineTo(x + s * 0.35, y + s * 0.35);
            ctx.stroke();
            
            // Decorative crossing lines (like the logo)
            ctx.beginPath();
            ctx.moveTo(x - s * 0.5, y - s * 0.3);
            ctx.lineTo(x + s * 0.5, y + s * 0.3);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(x - s * 0.4, y + s * 0.4);
            ctx.lineTo(x + s * 0.2, y - s * 0.5);
            ctx.stroke();
            
            ctx.restore();
        }
        
        // Pattern 0: Horizontal scan lines + noise (like image 1)
        function initScanLines() {
            scanLines = [];
            for (let i = 0; i < 8; i++) {
                scanLines.push({
                    y: Math.random() * height,
                    speed: 1.5 + Math.random() * 2.5,
                    thickness: 1 + Math.random() * 3,
                    blur: 10 + Math.random() * 40,
                    brightness: 0.3 + Math.random() * 0.7
                });
            }
            particles = [];
            for (let i = 0; i < 2000; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 2,
                    alpha: Math.random() * 0.5
                });
            }
        }
        
        function drawPattern0() {
            // Noise particles
            particles.forEach(p => {
                p.y += 2 + Math.random() * 2;
                if (p.y > height) {
                    p.y = 0;
                    p.x = Math.random() * width;
                }
                ctx.fillStyle = `rgba(26, 26, 26, ${p.alpha * 0.3})`;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            
            // Horizontal glow lines
            scanLines.forEach(line => {
                line.y += line.speed;
                if (line.y > height + 50) line.y = -50;
                
                const gradient = ctx.createLinearGradient(0, line.y - line.blur, 0, line.y + line.blur);
                gradient.addColorStop(0, 'rgba(26, 26, 26, 0)');
                gradient.addColorStop(0.5, `rgba(26, 26, 26, ${line.brightness * 0.15})`);
                gradient.addColorStop(1, 'rgba(26, 26, 26, 0)');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(0, line.y - line.blur, width, line.blur * 2);
                
                // Sharp line in center
                ctx.strokeStyle = `rgba(26, 26, 26, ${line.brightness * 0.2})`;
                ctx.lineWidth = line.thickness;
                ctx.beginPath();
                ctx.moveTo(0, line.y);
                ctx.lineTo(width, line.y);
                ctx.stroke();
            });
            
            // Central "d" logo with glow
            const pulse = Math.sin(time * 0.015) * 0.1 + 0.9;
            drawLogo(width / 2, height / 2, Math.min(width, height) * 0.3 * pulse, 0.15);
        }
        
        // Pattern 1: Intersecting lines network (like image 2)
        function initNetwork() {
            networkNodes = [];
            const nodeCount = 15;
            
            for (let i = 0; i < nodeCount; i++) {
                networkNodes.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    connections: []
                });
            }
            
            // Horizontal base lines
            lines = [];
            for (let i = 0; i < 6; i++) {
                lines.push({
                    y: height * 0.3 + (height * 0.4) * (i / 5),
                    alpha: 0.1 + Math.random() * 0.1
                });
            }
        }
        
        function drawPattern1() {
            // Horizontal base lines
            lines.forEach(line => {
                ctx.strokeStyle = `rgba(26, 26, 26, ${line.alpha})`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, line.y);
                ctx.lineTo(width, line.y);
                ctx.stroke();
            });
            
            // Update and draw network
            networkNodes.forEach(node => {
                node.x += node.vx;
                node.y += node.vy;
                
                // Bounce
                if (node.x < 0 || node.x > width) node.vx *= -1;
                if (node.y < 0 || node.y > height) node.vy *= -1;
            });
            
            // Draw connections
            ctx.strokeStyle = 'rgba(26, 26, 26, 0.08)';
            ctx.lineWidth = 1;
            
            for (let i = 0; i < networkNodes.length; i++) {
                for (let j = i + 1; j < networkNodes.length; j++) {
                    const dx = networkNodes[i].x - networkNodes[j].x;
                    const dy = networkNodes[i].y - networkNodes[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 400) {
                        const alpha = (1 - dist / 400) * 0.12;
                        ctx.strokeStyle = `rgba(26, 26, 26, ${alpha})`;
                        ctx.beginPath();
                        ctx.moveTo(networkNodes[i].x, networkNodes[i].y);
                        ctx.lineTo(networkNodes[j].x, networkNodes[j].y);
                        ctx.stroke();
                    }
                }
            }
            
            // Draw diagonal crossing lines through center
            const cx = width / 2;
            const cy = height / 2;
            
            for (let i = 0; i < 12; i++) {
                const angle = (i / 12) * Math.PI * 2 + time * 0.002;
                const len = Math.min(width, height) * 0.8;
                const wobble = Math.sin(time * 0.008 + i) * 50;
                
                ctx.strokeStyle = 'rgba(26, 26, 26, 0.06)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(cx + Math.cos(angle) * (len + wobble), cy + Math.sin(angle) * (len + wobble));
                ctx.lineTo(cx - Math.cos(angle) * (len + wobble), cy - Math.sin(angle) * (len + wobble));
                ctx.stroke();
            }
            
            // Small dots at intersections
            networkNodes.forEach(node => {
                ctx.fillStyle = 'rgba(26, 26, 26, 0.15)';
                ctx.beginPath();
                ctx.arc(node.x, node.y, 2, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // Central "d" logo
            drawLogo(width / 2, height / 2, Math.min(width, height) * 0.25, 0.12);
        }
        
        // Pattern 2: Floating geometric shapes
        function initGeometric() {
            lines = [];
            const count = 20;
            
            for (let i = 0; i < count; i++) {
                lines.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    length: 80 + Math.random() * 200,
                    angle: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.02,
                    driftX: (Math.random() - 0.5) * 1.5,
                    driftY: (Math.random() - 0.5) * 1.5
                });
            }
        }
        
        function drawPattern2() {
            // Floating lines
            ctx.strokeStyle = 'rgba(26, 26, 26, 0.1)';
            ctx.lineWidth = 1;
            
            lines.forEach(line => {
                line.angle += line.rotSpeed;
                line.x += line.driftX;
                line.y += line.driftY;
                
                // Wrap
                if (line.x < -100) line.x = width + 100;
                if (line.x > width + 100) line.x = -100;
                if (line.y < -100) line.y = height + 100;
                if (line.y > height + 100) line.y = -100;
                
                const x1 = line.x + Math.cos(line.angle) * line.length / 2;
                const y1 = line.y + Math.sin(line.angle) * line.length / 2;
                const x2 = line.x - Math.cos(line.angle) * line.length / 2;
                const y2 = line.y - Math.sin(line.angle) * line.length / 2;
                
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            });
            
            // Central rotating circles
            const cx = width / 2;
            const cy = height / 2;
            const baseRadius = Math.min(width, height) * 0.2;
            
            for (let i = 0; i < 3; i++) {
                const radius = baseRadius * (0.8 + i * 0.3);
                const wobble = Math.sin(time * 0.008 + i * 2) * 15;
                
                ctx.strokeStyle = `rgba(26, 26, 26, ${0.08 - i * 0.02})`;
                ctx.beginPath();
                ctx.arc(cx, cy, radius + wobble, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            // Orbiting points
            const orbitCount = 6;
            const points = [];
            
            for (let i = 0; i < orbitCount; i++) {
                const angle = (i / orbitCount) * Math.PI * 2 + time * 0.004;
                const r = baseRadius * 1.2 + Math.sin(time * 0.008 + i) * 20;
                points.push({
                    x: cx + Math.cos(angle) * r,
                    y: cy + Math.sin(angle) * r
                });
            }
            
            // Connect points
            ctx.strokeStyle = 'rgba(26, 26, 26, 0.06)';
            for (let i = 0; i < points.length; i++) {
                for (let j = i + 1; j < points.length; j++) {
                    ctx.beginPath();
                    ctx.moveTo(points[i].x, points[i].y);
                    ctx.lineTo(points[j].x, points[j].y);
                    ctx.stroke();
                }
            }
            
            // Central "d" logo
            const logoScale = 1 + Math.sin(time * 0.01) * 0.05;
            drawLogo(cx, cy, Math.min(width, height) * 0.22 * logoScale, 0.15);
        }
        
        function initPattern() {
            switch (pattern) {
                case 0: initScanLines(); break;
                case 1: initNetwork(); break;
                case 2: initGeometric(); break;
            }
        }
        
        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            switch (pattern) {
                case 0: drawPattern0(); break;
                case 1: drawPattern1(); break;
                case 2: drawPattern2(); break;
            }
            
            time++;
            requestAnimationFrame(animate);
        }
        
        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
